name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Publish latest build
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          body: |
            Auto-built from `main` at ${{ github.sha }}.
            Download `app-debug.apk` on an Android phone and install it
            (allow "install from unknown sources" when prompted). No expiry.
          prerelease: true
          files: app/build/outputs/apk/debug/app-debug.apk
